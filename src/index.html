<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIバード勉強会</title>
  <style>
    :root {
      --bg-1: #fff8f2;
      --bg-2: #fff3ea;
      --bg-3: #ffd8c5;
      --ink: #392722;
      --muted: #7b645b;
      --line: rgba(110, 76, 61, 0.14);
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --accent: #dd7a52;
      --accent-strong: #b45535;
      --accent-soft: rgba(255, 231, 219, 0.78);
      --shadow: 0 28px 70px rgba(144, 86, 58, 0.14);
      --radius-xl: 32px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --font-display: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      --font-body: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 219, 198, 0.92), transparent 22%),
        radial-gradient(circle at 86% 16%, rgba(255, 235, 222, 0.8), transparent 20%),
        radial-gradient(circle at 70% 84%, rgba(233, 165, 126, 0.15), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, #fffaf5);
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.12), transparent 26%, transparent 74%, rgba(255, 255, 255, 0.12)),
        radial-gradient(circle at 0 100%, rgba(255, 255, 255, 0.3), transparent 26%);
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 20px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 999px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy strong,
    .brand-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-copy strong {
      font-size: 16px;
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .counter {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .nav-button {
      min-width: 94px;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      font-weight: 800;
      box-shadow: 0 14px 24px rgba(180, 85, 53, 0.2);
      transition: transform 140ms ease, opacity 140ms ease;
    }

    .nav-button.secondary {
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      box-shadow: none;
      border: 1px solid var(--line);
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .nav-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .stage {
      min-height: 0;
      display: grid;
      align-items: stretch;
    }

    .viewport {
      position: relative;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      border-radius: var(--radius-xl);
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .viewport::-webkit-scrollbar {
      display: none;
    }

    .track {
      height: 100%;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 100%;
    }

    .slide {
      position: relative;
      width: 100%;
      min-width: 0;
      min-height: 100%;
      padding: 40px 44px 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      scroll-snap-align: start;
    }

    .slide::before,
    .slide::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .slide::before {
      width: 320px;
      height: 320px;
      top: -120px;
      right: -80px;
      background: radial-gradient(circle, rgba(255, 215, 192, 0.72), rgba(255, 215, 192, 0));
    }

    .slide::after {
      width: 240px;
      height: 240px;
      bottom: -120px;
      left: -90px;
      background: radial-gradient(circle, rgba(255, 239, 228, 0.96), rgba(255, 239, 228, 0));
    }

    .slide-header,
    .slide-body,
    .slide-footer {
      position: relative;
      z-index: 1;
    }

    .slide-header {
      display: grid;
      gap: 12px;
    }

    .kicker {
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      max-width: 980px;
      font-family: var(--font-display);
      font-size: clamp(34px, 4.6vw, 64px);
      line-height: 1.04;
      letter-spacing: -0.045em;
    }

    .subtitle {
      max-width: 860px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.72;
    }

    .slide-body {
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 18px;
    }

    .stack {
      display: grid;
      gap: 18px;
      align-content: start;
      min-height: 0;
      padding: 24px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .lead {
      margin: 0;
      font-size: 18px;
      line-height: 1.86;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .section {
      display: grid;
      gap: 10px;
      padding: 18px 18px 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 248, 244, 0.92);
      border: 1px solid rgba(180, 85, 53, 0.12);
    }

    .section.full {
      grid-column: 1 / -1;
    }

    .section-label {
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bullet-list {
      margin: 0;
      padding-left: 1.2em;
      display: grid;
      gap: 10px;
      font-size: 18px;
      line-height: 1.72;
    }

    .bullet-list.tight {
      gap: 8px;
      font-size: 16px;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 94px 1fr;
      gap: 14px;
      align-items: start;
      padding: 16px 18px;
      border-radius: var(--radius-md);
      background: rgba(255, 248, 244, 0.92);
      border: 1px solid rgba(180, 85, 53, 0.12);
    }

    .timeline-time {
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .timeline-copy strong,
    .timeline-copy span {
      display: block;
    }

    .timeline-copy strong {
      margin-bottom: 5px;
      font-size: 16px;
    }

    .timeline-copy span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .mini-card {
      padding: 22px;
      border-radius: var(--radius-lg);
      background: linear-gradient(145deg, rgba(255, 246, 240, 0.98), rgba(255, 255, 255, 0.95));
      border: 1px solid rgba(180, 85, 53, 0.12);
    }

    .mini-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .mini-card p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 11px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 700;
    }

    .quote-box {
      padding: 20px 22px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(255, 238, 228, 0.94), rgba(255, 250, 246, 0.98));
      border: 1px solid rgba(180, 85, 53, 0.16);
      font-size: 20px;
      line-height: 1.8;
      font-weight: 700;
    }

    .slide-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
    }

    .footer-note {
      max-width: 760px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .progress {
      min-width: 180px;
      display: grid;
      gap: 10px;
      justify-items: end;
    }

    .progress-bar {
      width: 180px;
      height: 8px;
      border-radius: 999px;
      background: rgba(221, 122, 82, 0.12);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      transition: width 240ms ease;
    }

    .progress-copy {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .filmstrip {
      display: grid;
      gap: 10px;
      padding: 12px 14px 14px;
      border-radius: 26px;
    }

    .filmstrip-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 2px 4px 0;
    }

    .filmstrip-head strong {
      font-size: 14px;
    }

    .filmstrip-head span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .toc-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 2px 4px;
      scroll-snap-type: x proximity;
    }

    .toc-list::-webkit-scrollbar {
      height: 8px;
    }

    .toc-list::-webkit-scrollbar-thumb {
      background: rgba(180, 85, 53, 0.18);
      border-radius: 999px;
    }

    .toc-item {
      flex: 0 0 196px;
      min-height: 90px;
      padding: 14px;
      text-align: left;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid transparent;
      scroll-snap-align: start;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .toc-item:hover,
    .toc-item:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(221, 122, 82, 0.28);
      outline: none;
    }

    .toc-item.active {
      background: linear-gradient(145deg, rgba(255, 231, 219, 0.92), rgba(255, 255, 255, 0.98));
      border-color: rgba(221, 122, 82, 0.32);
    }

    .toc-item small,
    .toc-item span {
      display: block;
    }

    .toc-item small {
      margin-bottom: 8px;
      color: var(--accent-strong);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .toc-item span {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    @media (max-width: 960px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: auto;
      }

      .viewport {
        overflow: visible;
        scroll-snap-type: none;
      }

      .track {
        display: grid;
        gap: 14px;
        grid-auto-flow: row;
        grid-auto-columns: auto;
      }

      .slide {
        min-height: auto;
        padding: 28px 22px 24px;
      }

      .section-grid,
      .split-grid {
        grid-template-columns: 1fr;
      }

      .slide-footer {
        flex-direction: column;
        align-items: stretch;
      }

      .progress {
        width: 100%;
        min-width: 0;
        justify-items: start;
      }

      .progress-bar {
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 12px;
        gap: 12px;
      }

      .topbar {
        flex-wrap: wrap;
        border-radius: 28px;
      }

      .controls {
        width: 100%;
        justify-content: space-between;
      }

      .counter {
        order: 1;
      }

      .nav-button {
        min-width: 0;
        flex: 1;
      }

      .brand {
        width: 100%;
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      .brand-copy strong,
      .brand-copy span {
        white-space: normal;
      }

      .slide {
        padding: 24px 18px 22px;
        gap: 20px;
      }

      .subtitle,
      .lead,
      .bullet-list {
        font-size: 15px;
        line-height: 1.72;
      }

      .stack,
      .section,
      .mini-card,
      .timeline-item,
      .quote-box {
        padding-left: 16px;
        padding-right: 16px;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }

      .toc-item {
        flex-basis: 168px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="app">
    <header class="topbar glass">
      <div class="brand">
        <div class="brand-mark">AI Bird Study Session</div>
        <div class="brand-copy">

        </div>
      </div>

        <div id="slideCount" class="counter">Slide 1 / 10</div>
        <button id="prevButton" class="nav-button secondary" type="button" aria-label="前のスライド">前へ</button>
        <button id="nextButton" class="nav-button" type="button" aria-label="次のスライド">次へ</button>
      </div>
    </header>

    <main class="stage">
      <section class="viewport glass" aria-label="プレゼンテーション">
        <div id="slideTrack" class="track"></div>
      </section>
    </main>

    <footer class="filmstrip glass">
      <div class="filmstrip-head">
        <strong>Slides</strong>
        <span id="tocCounter">1 / 10</span>
      </div>
      <div id="tocList" class="toc-list" role="tablist" aria-label="スライド一覧"></div>
    </footer>
  </div>

      {

            bullets: [

              'AI知識だけではなく、顧客理解が重要',
              '小さい改善の積み重ねが信頼につながる',
              '相手の業務に興味を持つことが継続支援につながる'

        footer: '最後は「伴走者としてどう向き合うか」というスタンスで締めます。'

    const slideTrack = document.getElementById('slideTrack');
    const viewport = document.querySelector('.viewport');
    const tocList = document.getElementById('tocList');
    const tocCounter = document.getElementById('tocCounter');
    const slideCount = document.getElementById('slideCount');
    const chapterLabel = document.getElementById('chapterLabel');
    const prevButton = document.getElementById('prevButton');
    const nextButton = document.getElementById('nextButton');

    let currentIndex = clampIndex(readHashIndex());
    let isProgrammaticScroll = false;
    let wheelThrottle = null;

    function readHashIndex() {
      const raw = window.location.hash.replace('#slide-', '');
      const parsed = Number(raw);
      if (!Number.isFinite(parsed)) {
        return 0;
      }
      return parsed - 1;
    }

    function clampIndex(index) {
      return Math.max(0, Math.min(slides.length - 1, Number(index) || 0));
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderBullets(items, className) {
      if (!items || !items.length) {
        return '';
      }
      return '<ul class="' + className + '">' + items.map((item) => '<li>' + escapeHtml(item) + '</li>').join('') + '</ul>';
    }

    function renderSections(sections) {
      if (!sections || !sections.length) {
        return '';
      }
      return [
        '<div class="section-grid">',
        sections.map((section, index) => {
          const fullClass = sections.length === 1 || (sections.length % 2 === 1 && index === sections.length - 1) ? ' full' : '';
          return [
            '<section class="section' + fullClass + '">',
            '<div class="section-label">' + escapeHtml(section.label) + '</div>',
            renderBullets(section.bullets, 'bullet-list' + (section.bullets.length > 5 ? ' tight' : '')),
            '</section>'
          ].join('');
        }).join(''),
        '</div>'
      ].join('');
    }

    function renderTimeline(items) {
      if (!items || !items.length) {
        return '';
      }
      return '<div class="timeline">' + items.map((item) => {
        return [
          '<div class="timeline-item">',
          '<div class="timeline-time">' + escapeHtml(item.time) + '</div>',
          '<div class="timeline-copy">',
          '<strong>' + escapeHtml(item.title) + '</strong>',
          '<span>' + escapeHtml(item.body) + '</span>',
          '</div>',
          '</div>'
        ].join('');
      }).join('') + '</div>';
    }

    function renderSplitCards(items) {
      if (!items || !items.length) {
        return '';
      }
      return '<div class="split-grid">' + items.map((item) => {
        return [
          '<article class="mini-card">',
          '<h3>' + escapeHtml(item.title) + '</h3>',
          '<p>' + escapeHtml(item.body) + '</p>',
          '</article>'
        ].join('');
      }).join('') + '</div>';
    }

    function renderChips(items) {
      if (!items || !items.length) {
        return '';
      }
      return '<div class="chips">' + items.map((item) => '<div class="chip">' + escapeHtml(item) + '</div>').join('') + '</div>';
    }

    function renderSlide(slide, index) {
      const progress = ((index + 1) / slides.length) * 100;
      const bodyParts = [
        slide.lead ? '<div class="stack"><p class="lead">' + escapeHtml(slide.lead) + '</p></div>' : '',
        slide.timeline ? '<div class="stack">' + renderTimeline(slide.timeline) + '</div>' : '',
        slide.splitCards ? '<div class="stack">' + renderSplitCards(slide.splitCards) + '</div>' : '',
        slide.sections ? '<div class="stack">' + renderSections(slide.sections) + '</div>' : '',
        slide.quote ? '<div class="quote-box">' + escapeHtml(slide.quote) + '</div>' : '',
        slide.chips ? '<div class="stack">' + renderChips(slide.chips) + '</div>' : ''
      ].join('');

      return [
        '<article class="slide" data-index="' + index + '">',
        '<div class="slide-header">',
        '<div class="kicker">' + escapeHtml(slide.kicker) + '</div>',
        '<h1 class="title">' + escapeHtml(slide.title) + '</h1>',
        '<div class="subtitle">' + escapeHtml(slide.subtitle) + '</div>',
        '</div>',
        '<div class="slide-body">' + bodyParts + '</div>',
        '<div class="slide-footer">',
        '<div class="footer-note">' + escapeHtml(slide.footer || '') + '</div>',
        '<div class="progress">',
        '<div class="progress-bar" aria-hidden="true"><div class="progress-fill" style="width:' + progress + '%"></div></div>',
        '<div class="progress-copy">' + escapeHtml(slide.chapter) + '</div>',
        '</div>',
        '</div>',
        '</article>'
      ].join('');
    }

    function buildSlides() {
      slideTrack.innerHTML = slides.map(renderSlide).join('');
    }

    function buildToc() {
      tocList.innerHTML = slides.map((slide, index) => {
        return [
          '<button class="toc-item" type="button" role="tab" aria-selected="false" data-index="' + index + '">',
          '<small>' + escapeHtml(slide.kicker) + '</small>',
          '<span>' + escapeHtml(slide.title) + '</span>',
          '</button>'
        ].join('');
      }).join('');

      tocList.addEventListener('click', (event) => {
        const trigger = event.target.closest('.toc-item');
        if (!trigger) {
          return;
        }
        goTo(Number(trigger.dataset.index));
      });
    }

    function syncUi() {
      const slide = slides[currentIndex];
      slideCount.textContent = 'Slide ' + (currentIndex + 1) + ' / ' + slides.length;
      tocCounter.textContent = (currentIndex + 1) + ' / ' + slides.length;
      chapterLabel.textContent = slide.chapter;
      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === slides.length - 1;
      window.location.hash = 'slide-' + (currentIndex + 1);

      if (!isCompactLayout()) {
        isProgrammaticScroll = true;
        viewport.scrollTo({
          left: currentIndex * viewport.clientWidth,
          behavior: 'smooth'
        });
        window.setTimeout(() => {
          isProgrammaticScroll = false;
        }, 460);
      }

      Array.prototype.forEach.call(tocList.querySelectorAll('.toc-item'), (button, index) => {
        const isActive = index === currentIndex;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-selected', isActive ? 'true' : 'false');
        if (isActive) {
          button.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      });
    }

    function goTo(index) {
      currentIndex = clampIndex(index);
      syncUi();
    }

    function isCompactLayout() {
      return window.matchMedia('(max-width: 960px)').matches;
    }

    function syncIndexFromScroll() {
      if (isCompactLayout() || isProgrammaticScroll) {
        return;
      }
      const nextIndex = clampIndex(Math.round(viewport.scrollLeft / Math.max(viewport.clientWidth, 1)));
      if (nextIndex !== currentIndex) {
        currentIndex = nextIndex;
        slideCount.textContent = 'Slide ' + (currentIndex + 1) + ' / ' + slides.length;
        tocCounter.textContent = (currentIndex + 1) + ' / ' + slides.length;
        chapterLabel.textContent = slides[currentIndex].chapter;
        prevButton.disabled = currentIndex === 0;
        nextButton.disabled = currentIndex === slides.length - 1;
        window.location.hash = 'slide-' + (currentIndex + 1);

        Array.prototype.forEach.call(tocList.querySelectorAll('.toc-item'), (button, index) => {
          const isActive = index === currentIndex;
          button.classList.toggle('active', isActive);
          button.setAttribute('aria-selected', isActive ? 'true' : 'false');
          if (isActive) {
            button.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
          }
        });
      }
    }

    prevButton.addEventListener('click', () => goTo(currentIndex - 1));
    nextButton.addEventListener('click', () => goTo(currentIndex + 1));

    viewport.addEventListener('click', (event) => {
      if (isCompactLayout()) {
        return;
      }
      const bounds = viewport.getBoundingClientRect();
      const clickedLeft = event.clientX - bounds.left < bounds.width / 2;
      goTo(currentIndex + (clickedLeft ? -1 : 1));
    });

    viewport.addEventListener('scroll', () => {
      if (wheelThrottle) {
        window.clearTimeout(wheelThrottle);
      }
      wheelThrottle = window.setTimeout(syncIndexFromScroll, 40);
    }, { passive: true });

    viewport.addEventListener('wheel', (event) => {
      if (isCompactLayout()) {
        return;
      }
      if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) {
        return;
      }
      event.preventDefault();
      viewport.scrollBy({
        left: event.deltaY,
        behavior: 'auto'
      });
    }, { passive: false });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key === 'Home') {
        event.preventDefault();
        goTo(0);
      }
      if (event.key === 'End') {
        event.preventDefault();
        goTo(slides.length - 1);
      }
    }, { passive: false });

    window.addEventListener('hashchange', () => {
      const nextIndex = clampIndex(readHashIndex());
      if (nextIndex !== currentIndex) {
        currentIndex = nextIndex;
        syncUi();
      }
    });

    window.addEventListener('resize', () => {
      if (!isCompactLayout()) {
        viewport.scrollLeft = currentIndex * viewport.clientWidth;
      }
    });

    buildSlides();
    buildToc();
    syncUi();
  </script>
